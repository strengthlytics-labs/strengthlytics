<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strengthlytics - Measure your strengths</title>
  </head>
  <body>
    <img src="/assets/logo.png" alt="Strengthlytics logo" width="440">

    <h2>Create Feedback drawer</h2>

    <input id="tokencreate" placeholder="Token" />
    <input id="label" placeholder="Label" />

    <button id="createBtn">Create</button>

    <pre id="result"></pre>

    <h2>Open Feedback drawer</h2>
    <input id="tokenopen" placeholder="Token" />
    <button id="openBtn">Open</button>
    <pre id="openResult"></pre>

    <h2>Add feedback</h2>

    <textarea id="feedbackText" placeholder="Write feedback here"></textarea>

    <br>

    <input id="feedbackSource" placeholder="Source (optional)" />
    <input id="feedbackContext" placeholder="Context (optional)" />
    <input id="feedbackType" placeholder="Type (optional)" />

    <br>

    <button id="saveFeedbackBtn">Save feedback</button>

    <pre id="saveFeedbackResult"></pre>

    <h2>Analyze strengths</h2>

    <button id="analyzeBtn">Analyze</button>
    <span id="analyzeLoader" style="display:none;">⏳ Analyzing strengths...</span>

    <pre id="analyzeResult"></pre>

    <script src="app.js"></script>
  </body>
</html>
